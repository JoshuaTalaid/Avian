<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avian — Bird Identifier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient background orbs -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="app-shell">

    <!-- ── HEADER ── -->
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20s-8-4.5-8-11.8C4 4.9 7.6 2 12 2s8 2.9 8 6.2C20 15.5 12 20 12 20z"/>
            <path d="M12 12c-1.5-2-4-2.5-6-1"/>
            <path d="M12 12c1.5-2 4-2.5 6-1"/>
            <circle cx="12" cy="9" r="1.5" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <h1 class="brand-name">Avian</h1>
      </div>
      <div class="status-chip" id="statusChip">
        <span class="status-dot"></span>
        <span id="status">Initialising…</span>
      </div>
    </header>

    <!-- ── MAIN ── -->
    <main class="main-content">

      <!-- Preview Zone -->
      <div class="preview-zone" id="previewZone">

        <!-- Idle placeholder -->
        <div class="idle-state" id="idleState">
          <div class="idle-bird">
            <svg width="72" height="72" viewBox="0 0 100 100" fill="none">
              <ellipse cx="50" cy="62" rx="28" ry="20" fill="rgba(74,222,128,0.08)" />
              <path d="M30 55 Q50 20 70 38 Q80 44 68 52 Q60 56 50 54 Q38 52 30 55Z" fill="rgba(74,222,128,0.18)" stroke="rgba(74,222,128,0.5)" stroke-width="1.5"/>
              <circle cx="64" cy="40" r="4" fill="rgba(74,222,128,0.3)" stroke="rgba(74,222,128,0.7)" stroke-width="1.2"/>
              <circle cx="65.5" cy="39" r="1.2" fill="#4ade80"/>
              <path d="M68 42 L74 44 L68 46" fill="rgba(34,211,238,0.4)" stroke="rgba(34,211,238,0.7)" stroke-width="1"/>
              <path d="M30 55 Q22 60 18 68 Q26 64 34 66" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.4)" stroke-width="1.2"/>
            </svg>
          </div>
          <p class="idle-title">Ready to identify</p>
          <p class="idle-sub">Upload a photo or use your camera<br>to discover any bird species</p>
        </div>

        <!-- Model loading overlay -->
        <div class="loading-veil" id="loadingVeil">
          <div class="loader-ring"></div>
          <p>Loading AI model…</p>
        </div>

        <!-- Scan line (shown while predicting) -->
        <div class="scan-line" id="scanLine"></div>

        <!-- Corner decorations -->
        <span class="corner tl"></span>
        <span class="corner tr"></span>
        <span class="corner bl"></span>
        <span class="corner br"></span>

        <!-- Media elements -->
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" style="display:none"></canvas>
        <img id="imagePreview" alt="Bird preview" />
      </div>

      <!-- ── CONTROLS ── -->
      <div class="controls-row" id="mainControls">
        <input type="file" id="imageUpload" accept="image/*" />

        <button class="btn btn-upload" id="uploadTrigger" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          Upload
        </button>

        <button class="btn btn-camera" id="cameraBtn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          Camera
        </button>
      </div>

      <!-- Capture row (hidden until camera opens) -->
      <div class="capture-row" id="captureRow">
        <button class="btn btn-capture" id="captureBtn">
          <span class="capture-ring"></span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="4" fill="currentColor"/>
          </svg>
          Capture &amp; Identify
        </button>
      </div>

      <!-- ── PREDICTION RESULT ── -->
      <div class="result-panel" id="resultPanel">
        <div class="result-eyebrow">Species identified</div>
        <div class="result-name" id="resultText">—</div>
        <div class="confidence-row">
          <div class="conf-track">
            <div class="conf-fill" id="confFill"></div>
          </div>
          <span class="conf-label" id="confLabel">—</span>
        </div>
      </div>

      <!-- ── BIRD INFO CARD ── -->
      <div class="bird-card" id="birdDisplay">
        <div class="bird-card-header">
          <div class="bird-card-icon" id="birdCardIcon">🐦</div>
          <div>
            <div class="bird-card-label">About this bird</div>
            <div class="bird-card-title" id="birdCardTitle">—</div>
          </div>
        </div>
        <div class="bird-card-divider"></div>
        <p class="bird-card-body" id="birdDisplay_desc">—</p>
        <div class="bird-tags" id="birdTags"></div>
      </div>

      <!-- Reset -->
      <div class="reset-row" id="resetRow">
        <button class="btn btn-ghost" id="resetBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
          </svg>
          Try Another Image
        </button>
      </div>

    </main>

    <footer class="app-footer">Powered by Joshua: Ing ana ko kaisog Mwehehehe</footer>

  </div><!-- /.app-shell -->

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0/dist/tf.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
